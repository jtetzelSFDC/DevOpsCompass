<template>
    <lightning-card title="Milestone Timeline" icon-name="standard:timesheet">

        <!-- Loading State -->
        <template lwc:if={isLoading}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <lightning-spinner
                    alternative-text="Loading timeline"
                    size="small">
                </lightning-spinner>
            </div>
        </template>

        <!-- Error State -->
        <template lwc:elseif={hasError}>
            <div class="slds-p-around_medium">
                <div class="slds-box slds-box_small slds-theme_error">
                    <div class="slds-text-heading_small slds-m-bottom_x-small">
                        Unable to Load Timeline
                    </div>
                    <p class="slds-text-body_small">
                        {errorMessage}
                    </p>
                </div>
            </div>
        </template>

        <!-- Timeline Content -->
        <template lwc:elseif={hasData}>
            <div class="timeline-container slds-p-around_medium">
                <template for:each={milestones} for:item="milestone">
                    <div key={milestone.order} class="milestone-item">

                        <!-- Milestone Icon -->
                        <div class={milestone.iconClass}>
                            <template lwc:if={milestone.completed}>
                                <lightning-icon
                                    icon-name="utility:check"
                                    size="xx-small"
                                    variant="inverse">
                                </lightning-icon>
                            </template>
                        </div>

                        <!-- Milestone Content -->
                        <div class={milestone.contentClass}>
                            <div class="milestone-label">
                                {milestone.label}
                            </div>
                            <template lwc:if={milestone.displayDate}>
                                <div class="milestone-date">
                                    {milestone.displayDate}
                                </div>
                            </template>
                        </div>

                        <!-- Connecting Line (not for last item) -->
                        <template lwc:if={milestone.showLine}>
                            <div class={milestone.lineClass}></div>
                        </template>
                    </div>
                </template>
            </div>
        </template>

        <!-- Empty State -->
        <template lwc:else>
            <div class="slds-p-around_medium slds-text-align_center">
                <p class="slds-text-color_weak">
                    No timeline data available
                </p>
            </div>
        </template>

    </lightning-card>
</template>
