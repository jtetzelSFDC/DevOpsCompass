<template>
    <lightning-card title="Repository Overview" icon-name="custom:custom63">
        <template if:true={repository.data}>
            <div class="slds-p-around_medium">
                <!-- Repository Name and Provider -->
                <div class="slds-grid slds-gutters slds-m-bottom_medium">
                    <div class="slds-col slds-size_1-of-1">
                        <h2 class="slds-text-heading_medium">{repositoryName}</h2>
                        <p class="slds-text-color_weak slds-m-top_x-small">{description}</p>
                    </div>
                </div>

                <!-- Repository Details -->
                <div class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <div class="slds-text-title slds-m-bottom_xx-small">Provider</div>
                        <div class="slds-text-body_regular">
                            <lightning-icon icon-name="utility:package" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                            {provider}
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <div class="slds-text-title slds-m-bottom_xx-small">Default Branch</div>
                        <div class="slds-text-body_regular">
                            <lightning-icon icon-name="utility:branch_merge" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                            {defaultBranch}
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <div class="slds-text-title slds-m-bottom_xx-small">Last Sync</div>
                        <div class="slds-text-body_regular">
                            <lightning-icon icon-name="utility:sync" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                            {lastSyncDate}
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <div class="slds-text-title slds-m-bottom_xx-small">Sync Status</div>
                        <div>
                            <span class={syncStatusClass}>{syncStatus}</span>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="slds-m-top_medium">
                    <template if:true={hasRepositoryUrl}>
                        <lightning-button
                            label="View in GitHub"
                            onclick={handleViewInGitHub}
                            icon-name="utility:new_window"
                            variant="brand">
                        </lightning-button>
                    </template>
                </div>
            </div>
        </template>

        <template if:true={repository.error}>
            <div class="slds-p-around_medium">
                <p class="slds-text-color_error">Error loading repository data</p>
            </div>
        </template>
    </lightning-card>
</template>
